backend:
  name: git-gateway
  branch: main

media_folder: "photos"
public_folder: "photos"

collections:
  - name: "portraits"
    label: "Portraits"
    folder: "photos/Portret"
    create: true
    fields:
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Title", name: "title", widget: "string", required: false }

  - name: "cars"
    label: "Cars"
    folder: "photos/car"
    create: true
    fields:
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Title", name: "title", widget: "string", required: false }

  - name: "landscape"
    label: "Landscape"
    folder: "photos/lendscape"
    create: true
    fields:
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Title", name: "title", widget: "string", required: false }

  - name: "street"
    label: "Street"
    folder: "photos/street"
    create: true
    fields:
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Title", name: "title", widget: "string", required: false }

  - name: "events"
    label: "Events"
    folder: "photos/Koncert"
    create: true
    fields:
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Title", name: "title", widget: "string", required: false }
